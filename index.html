<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI Invitation Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f0; }

    #app {
      display: flex;
      height: 100vh;
      border: 1px solid #ddd;
      overflow: hidden;
      background: #fff;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    #sidebar-header h2 { font-size: 15px; font-weight: 600; color: #111; }
    #sidebar-header p  { font-size: 12px; color: #777; margin-top: 3px; }

    #sidebar-body { flex: 1; overflow-y: auto; padding: 14px; }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f0f0ec;
    }
    #canvas-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }
    #canvas-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    /* ── Image container ── */
    #img-container {
      position: relative;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.14);
      border-radius: 4px;
      overflow: hidden;
    }
    #inv-img {
      display: block;
      max-width: 100%;
      max-height: 480px;
      pointer-events: none;
      user-select: none;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 14px;
    }
    .upload-zone:hover { background: #f9f9f7; }
    .upload-zone svg   { margin: 0 auto 10px; display: block; opacity: 0.4; }
    .upload-zone p     { font-size: 13px; color: #666; }
    .upload-zone span  { font-size: 11px; color: #aaa; }

    /* ── Field cards ── */
    .field-card {
      background: #f9f9f7;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s;
    }
    .field-card:hover  { border-color: #ccc; }
    .field-card.active { border-color: #378ADD; background: #eef5fd; }
    .field-card label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 5px;
    }
    .field-card input {
      width: 100%;
      font-size: 13px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 8px;
      color: #111;
      outline: none;
    }
    .field-card input:focus {
      border-color: #378ADD;
      box-shadow: 0 0 0 2px rgba(55,138,221,0.15);
    }

    /* ── Draggable overlays ── */
    .overlay-text {
      position: absolute;
      cursor: move;
      user-select: none;
      white-space: pre;
      line-height: 1.2;
      padding: 3px 5px;
      border-radius: 3px;
      border: 1.5px solid transparent;
      transition: border-color 0.1s;
    }
    .overlay-text:hover    { border-color: rgba(55,138,221,0.4); }
    .overlay-text.selected { border-color: #378ADD; background: rgba(55,138,221,0.07); }
    .overlay-text.editing  {
      cursor: text;
      border-color: #378ADD;
      background: rgba(255,255,255,0.92);
      outline: none;
    }

    /* ── Style panel ── */
    .style-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .style-row label { font-size: 11px; color: #777; min-width: 38px; }
    .style-row select,
    .style-row input[type=number] {
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #111;
      outline: none;
      flex: 1;
    }

    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    .color-dot.sel {
      border-color: #378ADD;
      box-shadow: 0 0 0 2px rgba(55,138,221,0.3);
    }

    /* ── Buttons ── */
    .btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid #ddd;
      background: #fff;
      color: #222;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.12s;
    }
    .btn:hover   { background: #f5f5f3; }
    .btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
    .btn.primary:hover { background: #0C447C; }
    .btn.sm { padding: 4px 9px; font-size: 11px; }

    /* ── Misc ── */
    .ai-badge {
      font-size: 10px;
      background: #eef5fd;
      color: #185FA5;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
    }
    #status { font-size: 12px; color: #777; padding: 0 4px; flex: 1; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #e5e5e5;
      border-top-color: #378ADD;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 14px 0 8px;
    }
    .hint-chip {
      font-size: 11px;
      background: #f5f5f3;
      border-radius: 999px;
      padding: 3px 10px;
      color: #777;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      #sidebar {
        width: 100%;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e5e5;
        max-height: 50vh;
        overflow-y: auto;
      }

      #sidebar-header {
        padding: 12px 16px;
      }

      #sidebar-header h2 {
        font-size: 16px;
      }

      #sidebar-body {
        padding: 12px 16px;
      }

      #canvas-area {
        flex: 1;
        min-height: 50vh;
      }

      #canvas-toolbar {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 6px;
      }

      #status {
        width: 100%;
        order: -1;
        margin-bottom: 4px;
        font-size: 11px;
      }

      .btn {
        font-size: 11px;
        padding: 6px 10px;
        flex: 1;
      }

      #canvas-wrap {
        padding: 12px;
      }

      #inv-img {
        max-width: 100%;
        max-height: 60vh;
      }

      .upload-zone {
        padding: 24px 12px;
      }

      .upload-zone svg {
        width: 32px;
        height: 32px;
      }

      .field-card {
        padding: 8px 10px;
      }

      .field-card input {
        font-size: 14px;
      }

      .style-row {
        flex-wrap: wrap;
      }

      .style-row label {
        min-width: 100%;
        margin-bottom: 4px;
      }

      .overlay-text {
        min-width: 60px;
        font-size: 14px !important;
        padding: 4px 6px;
      }

      /* Make color palette scrollable on mobile */
      #color-palette {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }

      .color-dot {
        flex-shrink: 0;
      }

      /* Improve touch targets */
      .btn, .field-card, .overlay-text, .color-dot {
        min-height: 36px;
      }

      /* Stack buttons vertically on very small screens */
      @media (max-width: 480px) {
        #canvas-toolbar {
          flex-direction: column;
        }

        .btn {
          width: 100%;
          justify-content: center;
        }

        #sidebar {
          max-height: 60vh;
        }

        .field-card input {
          font-size: 16px; /* Prevent zoom on iOS */
        }

        .style-row input[type=number],
        .style-row select {
          font-size: 16px; /* Prevent zoom on iOS */
        }
      }
    }

    /* Landscape mobile optimization */
    @media (max-width: 768px) and (orientation: landscape) {
      #app {
        flex-direction: row;
      }

      #sidebar {
        width: 280px;
        min-width: 280px;
        max-height: 100vh;
        border-right: 1px solid #e5e5e5;
        border-bottom: none;
      }

      #canvas-area {
        min-height: auto;
      }

      #inv-img {
        max-height: 70vh;
      }
    }

    /* Tablet optimization */
    @media (min-width: 769px) and (max-width: 1024px) {
      #sidebar {
        width: 280px;
        min-width: 280px;
      }

      #inv-img {
        max-height: 60vh;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>AI Invitation Builder</h2>
      <p>Upload a template — AI detects where to type</p>
    </div>

    <div id="sidebar-body">

      <!-- Upload zone -->
      <div class="upload-zone" onclick="document.getElementById('file-in').click()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Click to upload invitation image</p>
        <span>PNG, JPG, WEBP supported</span>
      </div>
      <input type="file" id="file-in" accept="image/*" style="display:none">

      <!-- Detected fields -->
      <div id="fields-section" style="display:none">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="section-title" style="margin:0">Detected fields</span>
          <span class="ai-badge">AI</span>
        </div>
        <div class="hint-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Click any overlay on the image to edit
        </div>
        <div id="fields-list"></div>
        <button class="btn sm"
                style="margin-top:6px;width:100%;justify-content:center"
                onclick="addCustomField()">+ Add custom text</button>
      </div>

      <!-- Style panel (shown when an overlay is selected) -->
      <div id="style-section" style="display:none;margin-top:14px">
        <div class="section-title">Selected text style</div>

        <div class="style-row">
          <label>Font</label>
          <select id="s-font" onchange="applyStyle('fontFamily', this.value)">
            <option value="Georgia,serif">Georgia</option>
            <option value="'Palatino Linotype',serif">Palatino</option>
            <option value="'Times New Roman',serif">Times New Roman</option>
            <option value="Arial,sans-serif">Arial</option>
            <option value="'Trebuchet MS',sans-serif">Trebuchet</option>
            <option value="'Courier New',monospace">Courier New</option>
            <option value="Impact,sans-serif">Impact</option>
          </select>
        </div>

        <div class="style-row">
          <label>Size</label>
          <input type="number" id="s-size" min="8" max="120" value="20"
                 onchange="applyStyle('fontSize', this.value + 'px')">
        </div>

        <div class="style-row">
          <label>Bold</label>
          <input type="checkbox" id="s-bold" style="width:auto"
                 onchange="applyStyle('fontWeight', this.checked ? '700' : '400')">
        </div>

        <div class="style-row">
          <label>Italic</label>
          <input type="checkbox" id="s-italic" style="width:auto"
                 onchange="applyStyle('fontStyle', this.checked ? 'italic' : 'normal')">
        </div>

        <div class="style-row" style="flex-wrap:wrap;gap:5px;align-items:center">
          <label>Color</label>
          <div style="display:flex;flex-wrap:wrap;gap:4px" id="color-palette"></div>
        </div>

        <div class="style-row">
          <label>Align</label>
          <select id="s-align" onchange="applyStyle('textAlign', this.value)">
            <option value="left">Left</option>
            <option value="center">Center</option>
            <option value="right">Right</option>
          </select>
        </div>
      </div>

    </div><!-- /sidebar-body -->
  </div><!-- /sidebar -->

  <!-- ═══════════════════════════ CANVAS ═══════════════════════════ -->
  <div id="canvas-area">

    <div id="canvas-toolbar">
      <div id="status">Upload an invitation image to get started</div>
      <button class="btn" onclick="downloadImg()" id="dl-btn" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Download
      </button>
      <button class="btn primary" onclick="printImg()" id="print-btn" style="display:none">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>
    </div>

    <div id="canvas-wrap">
      <div id="empty-state" style="text-align:center;color:#bbb">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1"
             style="margin:0 auto 12px;display:block;opacity:0.3">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p style="font-size:13px">Your invitation will appear here</p>
      </div>

      <div id="img-container" style="display:none">
        <img id="inv-img" alt="Invitation template">
      </div>
    </div>

  </div><!-- /canvas-area -->
</div><!-- /app -->

<!-- ═══════════════════════════ SCRIPT ═══════════════════════════ -->
<script>
  // ── Config ──────────────────────────────────────────────────────
  // IMPORTANT: Replace this with your actual Anthropic API key.
  // For production apps, never expose the API key in client-side code.
  // Use a backend proxy instead.
  const ANTHROPIC_API_KEY = 'YOUR_ANTHROPIC_API_KEY_HERE';

  const COLORS = [
    '#000000','#FFFFFF','#333333','#8B0000',
    '#000080','#4a3728','#D4AF37','#555555',
    '#1a472a','#7b3f00'
  ];

  // ── State ────────────────────────────────────────────────────────
  let overlays     = [];
  let selId        = null;
  let dragState    = null;
  let fieldCounter = 0;

  const container  = document.getElementById('img-container');
  const img        = document.getElementById('inv-img');

  // ── Build color palette ──────────────────────────────────────────
  const palette = document.getElementById('color-palette');
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = c;
    dot.dataset.c = c;
    dot.title = c;
    dot.onclick = () => pickColor(c);
    palette.appendChild(dot);
  });

  // ── File upload ──────────────────────────────────────────────────
  document.getElementById('file-in').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      img.src = ev.target.result;
      img.onload = () => {
        container.style.display = 'inline-block';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('dl-btn').style.display   = '';
        document.getElementById('print-btn').style.display = '';
        overlays = []; renderOverlays(); renderFields();
        analyzeWithClaude(ev.target.result, f.type);
      };
    };
    reader.readAsDataURL(f);
  });

  // ── AI analysis ──────────────────────────────────────────────────
  async function analyzeWithClaude(b64full, mimeType) {
    setStatus('Analyzing your invitation with AI…', true);
    document.getElementById('fields-section').style.display = 'none';
    const b64 = b64full.split(',')[1];

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method : 'POST',
        headers: {
          'Content-Type'      : 'application/json',
          'x-api-key'         : ANTHROPIC_API_KEY,
          'anthropic-version' : '2023-06-01'
        },
        body: JSON.stringify({
          model     : 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system    : `You are an invitation template analyzer. Analyze the invitation image and
identify ALL blank/fillable areas — these include: dashed lines (------), dotted lines (......),
underscores (____), blank spaces after labels like "Name:", "Date:", "To:",
bracketed placeholders like [Name] or {Guest}, and any other obvious fill-in spots.

Return ONLY a JSON array. No markdown, no explanation. Each item:
{"id":"f1","label":"Guest Name","hint":"e.g. John Smith","x_pct":0.5,"y_pct":0.3,"suggested":""}

x_pct and y_pct are 0-1 floats representing position as fraction of image width/height
where the text should be placed. Be precise based on where the blank/dash/dot line
actually is in the image.`,
          messages: [{
            role   : 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mimeType, data: b64 } },
              { type: 'text',  text  : 'Analyze this invitation. Find every fillable blank, dash line, dotted line, underscore area, or placeholder. Return the JSON array only.' }
            ]
          }]
        })
      });

      const data   = await resp.json();
      const txt    = data.content?.find(b => b.type === 'text')?.text || '[]';
      let fields;
      try   { fields = JSON.parse(txt.replace(/```json|```/g, '').trim()); }
      catch { fields = []; }

      if (!Array.isArray(fields) || fields.length === 0) {
        setStatus('No fillable fields auto-detected. Add text manually.');
        addDefaultField();
      } else {
        setStatus(`Found ${fields.length} fillable field${fields.length > 1 ? 's' : ''} — click any to edit`);
        fields.forEach(f => addOverlayFromField(f));
        document.getElementById('fields-section').style.display = '';
        renderFields();
      }
    } catch (err) {
      console.error(err);
      setStatus('AI analysis failed. Add text manually.');
      addDefaultField();
      document.getElementById('fields-section').style.display = '';
    }
  }

  // ── Overlay helpers ──────────────────────────────────────────────
  function addOverlayFromField(f) {
    const dw = img.offsetWidth, dh = img.offsetHeight;
    fieldCounter++;
    overlays.push({
      id        : 'ov' + fieldCounter,
      fieldId   : 'fld' + fieldCounter,
      label     : f.label || 'Field ' + fieldCounter,
      text      : f.suggested || '',
      x         : Math.round((f.x_pct || 0.5) * dw),
      y         : Math.round((f.y_pct || 0.3) * dh),
      fontSize  : '20',
      fontFamily: 'Georgia,serif',
      color     : '#000000',
      fontWeight: '400',
      fontStyle : 'normal',
      textAlign : 'center'
    });
    renderOverlays();
    renderFields();
  }

  function addDefaultField() {
    fieldCounter++;
    const dw = img.offsetWidth, dh = img.offsetHeight;
    overlays.push({
      id        : 'ov' + fieldCounter,
      fieldId   : 'fld' + fieldCounter,
      label     : 'Text',
      text      : 'Your Text Here',
      x         : dw / 2 - 60,
      y         : dh / 2,
      fontSize  : '22',
      fontFamily: 'Georgia,serif',
      color     : '#000000',
      fontWeight: '400',
      fontStyle : 'normal',
      textAlign : 'center'
    });
    document.getElementById('fields-section').style.display = '';
    renderOverlays();
    renderFields();
  }

  function addCustomField() { addDefaultField(); selectOverlay(overlays[overlays.length - 1].id); }

  // ── Render overlays on canvas ────────────────────────────────────
  function renderOverlays() {
    document.querySelectorAll('.overlay-text').forEach(e => e.remove());
    overlays.forEach(ov => createOverlayEl(ov));
  }

  function createOverlayEl(ov) {
    const el = document.createElement('div');
    el.className      = 'overlay-text' + (ov.id === selId ? ' selected' : '');
    el.id             = 'el-' + ov.id;
    el.contentEditable = 'false';
    el.textContent    = ov.text || '[' + ov.label + ']';
    applyOvStyle(el, ov);
    el.style.left = ov.x + 'px';
    el.style.top  = ov.y + 'px';

    // Single click → select & start drag
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if (el.contentEditable === 'true') return;
      selectOverlay(ov.id);
      dragState = { id: ov.id, startX: e.clientX - ov.x, startY: e.clientY - ov.y };
    });

    // Touch support for mobile
    el.addEventListener('touchstart', e => {
      e.stopPropagation();
      if (el.contentEditable === 'true') return;
      selectOverlay(ov.id);
      const touch = e.touches[0];
      dragState = { id: ov.id, startX: touch.clientX - ov.x, startY: touch.clientY - ov.y };
    }, { passive: true });

    // Double click → inline edit
    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      selectOverlay(ov.id);
      el.contentEditable = 'true';
      el.classList.add('editing');
      el.focus();
      // Select all text
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      el.addEventListener('blur', () => {
        el.contentEditable = 'false';
        el.classList.remove('editing');
        ov.text = el.textContent;
        syncFieldInput(ov.id, ov.text);
      }, { once: true });

      el.addEventListener('keydown', ke => {
        if (ke.key === 'Enter' && !ke.shiftKey) { ke.preventDefault(); el.blur(); }
        if (ke.key === 'Escape') el.blur();
      });
    });

    // Long press on mobile → edit
    let longPressTimer;
    el.addEventListener('touchstart', e => {
      longPressTimer = setTimeout(() => {
        e.stopPropagation();
        selectOverlay(ov.id);
        el.contentEditable = 'true';
        el.classList.add('editing');
        el.focus();
        const range = document.createRange();
        range.selectNodeContents(el);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);

        el.addEventListener('blur', () => {
          el.contentEditable = 'false';
          el.classList.remove('editing');
          ov.text = el.textContent;
          syncFieldInput(ov.id, ov.text);
        }, { once: true });
      }, 500);
    }, { passive: true });

    el.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    });

    el.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    });

    container.appendChild(el);
  }

  function applyOvStyle(el, ov) {
    el.style.fontSize   = (parseInt(ov.fontSize) || 20) + 'px';
    el.style.fontFamily = ov.fontFamily || 'Georgia,serif';
    el.style.color      = ov.color      || '#000';
    el.style.fontWeight = ov.fontWeight || '400';
    el.style.fontStyle  = ov.fontStyle  || 'normal';
    el.style.textAlign  = ov.textAlign  || 'left';
    el.style.minWidth   = '40px';
  }

  // ── Drag to reposition ───────────────────────────────────────────
  document.addEventListener('mousemove', e => {
    if (!dragState) return;
    const ov = overlays.find(o => o.id === dragState.id);
    if (!ov) return;
    const maxX = container.offsetWidth  - 20;
    const maxY = container.offsetHeight - 20;
    ov.x = Math.max(0, Math.min(e.clientX - dragState.startX, maxX));
    ov.y = Math.max(0, Math.min(e.clientY - dragState.startY, maxY));
    const el = document.getElementById('el-' + ov.id);
    if (el) { el.style.left = ov.x + 'px'; el.style.top = ov.y + 'px'; }
  });
  document.addEventListener('mouseup', () => { dragState = null; });

  // Touch support for dragging
  document.addEventListener('touchmove', e => {
    if (!dragState) return;
    const ov = overlays.find(o => o.id === dragState.id);
    if (!ov) return;
    const touch = e.touches[0];
    const maxX = container.offsetWidth  - 20;
    const maxY = container.offsetHeight - 20;
    ov.x = Math.max(0, Math.min(touch.clientX - dragState.startX, maxX));
    ov.y = Math.max(0, Math.min(touch.clientY - dragState.startY, maxY));
    const el = document.getElementById('el-' + ov.id);
    if (el) { el.style.left = ov.x + 'px'; el.style.top = ov.y + 'px'; }
  }, { passive: true });
  document.addEventListener('touchend', () => { dragState = null; });

  // Click on empty canvas → deselect
  container.addEventListener('click', e => {
    if (e.target === container || e.target === img) {
      selId = null;
      document.querySelectorAll('.overlay-text').forEach(el => el.classList.remove('selected'));
      document.getElementById('style-section').style.display = 'none';
    }
  });

  // ── Selection ────────────────────────────────────────────────────
  function selectOverlay(id) {
    selId = id;
    const ov = overlays.find(o => o.id === id);
    document.querySelectorAll('.overlay-text').forEach(el => {
      el.classList.toggle('selected', el.id === 'el-' + id);
    });
    document.querySelectorAll('.field-card').forEach(c => {
      c.classList.toggle('active', c.dataset.ovid === id);
    });
    if (ov) populateStylePanel(ov);
    document.getElementById('style-section').style.display = ov ? '' : 'none';
  }

  function populateStylePanel(ov) {
    document.getElementById('s-font').value  = ov.fontFamily;
    document.getElementById('s-size').value  = parseInt(ov.fontSize) || 20;
    document.getElementById('s-bold').checked   = ov.fontWeight === '700';
    document.getElementById('s-italic').checked = ov.fontStyle  === 'italic';
    document.getElementById('s-align').value = ov.textAlign || 'left';
    document.querySelectorAll('.color-dot').forEach(d => {
      d.classList.toggle('sel', d.dataset.c === ov.color);
    });
  }

  // ── Style application ────────────────────────────────────────────
  function applyStyle(prop, val) {
    if (!selId) return;
    const ov = overlays.find(o => o.id === selId);
    if (!ov) return;
    ov[prop] = val;
    const el = document.getElementById('el-' + ov.id);
    if (el) applyOvStyle(el, ov);
  }

  function pickColor(c) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('sel', d.dataset.c === c));
    applyStyle('color', c);
  }

  // ── Render sidebar field list ────────────────────────────────────
  function renderFields() {
    const list = document.getElementById('fields-list');
    list.innerHTML = '';
    overlays.forEach(ov => {
      const card = document.createElement('div');
      card.className    = 'field-card' + (ov.id === selId ? ' active' : '');
      card.dataset.ovid = ov.id;
      card.onclick      = () => selectOverlay(ov.id);
      card.innerHTML    = `
        <label>${ov.label}</label>
        <div style="display:flex;gap:5px;align-items:center">
          <input type="text" value="${escHtml(ov.text)}"
                 placeholder="Type here…"
                 data-ovid="${ov.id}"
                 onclick="event.stopPropagation()">
          <button class="btn sm"
                  style="padding:4px 7px;flex-shrink:0"
                  onclick="event.stopPropagation();removeOverlay('${ov.id}')"
                  title="Remove">✕</button>
        </div>`;
      card.querySelector('input').addEventListener('input', e => {
        ov.text = e.target.value;
        const el = document.getElementById('el-' + ov.id);
        if (el) el.textContent = ov.text || '[' + ov.label + ']';
      });
      list.appendChild(card);
    });
  }

  function syncFieldInput(ovId, text) {
    const inp = document.querySelector(`input[data-ovid="${ovId}"]`);
    if (inp) inp.value = text;
  }

  function removeOverlay(id) {
    overlays = overlays.filter(o => o.id !== id);
    const el = document.getElementById('el-' + id);
    if (el) el.remove();
    if (selId === id) { selId = null; document.getElementById('style-section').style.display = 'none'; }
    renderFields();
  }

  // ── Utilities ────────────────────────────────────────────────────
  function setStatus(msg, loading) {
    const s = document.getElementById('status');
    s.innerHTML = loading
      ? `<div style="display:flex;align-items:center;gap:7px"><div class="spinner"></div><span>${msg}</span></div>`
      : msg;
  }

  function escHtml(s) {
    return (s || '')
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  // ── Download ─────────────────────────────────────────────────────
  async function downloadImg() {
    if (!container.style.display || container.style.display === 'none') return;
    const prevSel = selId;
    selId = null;
    document.querySelectorAll('.overlay-text').forEach(el => el.classList.remove('selected'));
    setStatus('Generating image…', true);
    try {
      // html-to-image via ESM CDN
      const { toPng } = await import('https://esm.sh/html-to-image@1.11.11');
      const url = await toPng(container, { cacheBust: true, pixelRatio: 2, style: { display: 'inline-block' } });
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'invitation.png';
      a.click();
      setStatus('Downloaded!');
    } catch (e) {
      setStatus('Use Print → Save as PDF to save your invitation.');
      alert('Tip: Use the Print button and choose "Save as PDF".');
    }
    selId = prevSel;
    if (selId) document.getElementById('el-' + selId)?.classList.add('selected');
  }

  // ── Print ────────────────────────────────────────────────────────
  function printImg() {
    const win = window.open('', '_blank');
    const overlayHTML = overlays.map(ov => `
      <div style="
        position:absolute;
        left:${ov.x}px; top:${ov.y}px;
        font-size:${ov.fontSize}px;
        font-family:${ov.fontFamily};
        color:${ov.color};
        font-weight:${ov.fontWeight};
        font-style:${ov.fontStyle};
        text-align:${ov.textAlign};
        white-space:pre;
        line-height:1.2">${escHtml(ov.text)}</div>`).join('');

    win.document.write(`<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>Invitation</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { display:flex; justify-content:center; align-items:flex-start; padding:0; }
    @media print { @page { margin:0; size:auto; } }
  </style>
</head><body>
  <div style="position:relative;display:inline-block">
    <img src="${img.src}" style="display:block;max-width:100vw" onload="window.print()">
    ${overlayHTML}
  </div>
</body></html>`);
    win.document.close();
  }
</script>
</body>
</html>
